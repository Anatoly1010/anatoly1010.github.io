{% include base_path %}

<div class="site-footer">
  <div class="site-footer__copyright">
    &copy; {{ site.time | date: '%Y' }} Anatoly Melnikov &middot;
    <span class="site-footer__meta">Updated {{ "now" | date: '%Y-%m-%d' }}</span>
  </div>

  <ul class="site-footer__links">
    {% if site.author.github %}
      <li><a href="https://github.com/{{ site.author.github }}" aria-label="GitHub"><i class="fab fa-github" aria-hidden="true"></i> GitHub</a></li>
    {% endif %}
    {% if site.atom_feed.hide != true %}
      <li><a href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" aria-label="Feed"><i class="fa fa-rss" aria-hidden="true"></i> Feed</a></li>
    {% endif %}
    <li><a href="{{ base_path }}/sitemap/">Sitemap</a></li>
  </ul>
</div>
